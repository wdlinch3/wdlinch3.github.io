<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Effective Actions — William D. Linch</title>
  <style>
    :root {
      --bg: #111;
      --text: #ddd;
      --muted: #aaa;
      --link: #8ab4ff;
      --border: #333;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 18px/1.65 Georgia, serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px 48px;
    }
    h1, h2, h3 { line-height: 1.2; }
    h1 { margin-bottom: 0.2em; }
    h2 { margin-top: 1.7em; }
    p, li { max-width: 42em; }
    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .topnav, .subnav {
      color: var(--muted);
      margin-bottom: 1.1em;
      font-size: 0.98em;
    }
    .cite {
      font-size: 0.82em;
      vertical-align: super;
      margin-left: 0.08em;
    }
    .muted { color: var(--muted); }
    .refs {
      margin-top: 2em;
      padding-top: 1em;
      border-top: 1px solid var(--border);
      font-size: 0.96em;
    }
    .refs li { margin-bottom: 0.8em; }
    code {
      font-size: 0.92em;
      background: #1a1a1a;
      padding: 0.1em 0.3em;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <div class="topnav"><a href="/">&#8592; Back to home</a></div>

    <h1>A-theory</h1>

    <p></p>

  </main>
</body>
</html>
